<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; width: 240px; margin: 0; padding: 14px; color: #1d2226; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    .row { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 10px; }
    .muted { color: #56687a; font-size: 12px; }
    button { font: inherit; cursor: pointer; background: #0a66c2; color: #fff; border: none; border-radius: 16px; padding: 6px 14px; font-weight: 600; }
    button:hover { background: #004182; }
  </style>
</head>
<body>
  <h1>LinkedIn AI Wheel</h1>
  <label class="row"><input id="enabled" type="checkbox" /> Show ✨ on posts</label>
  <div class="row muted" id="providerLine">Provider: …</div>
  <div class="row"><button id="settings">Settings</button></div>
  <div class="muted">Reload LinkedIn after toggling.</div>
  <script src="popup.js"></script>
</body>
</html>
